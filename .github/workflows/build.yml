name: Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: npm

      - name: 🏗S etup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: ⚙️ Configure Gradle Memory
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build app
        run: eas build --local --non-interactive --platform android --profile preview

      - name: Upload Artifact GitHub Action
        uses: actions/upload-artifact@v4
        with:
          name: assets-for-download
          path: build-*.apk
